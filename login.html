
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Almarai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{
font-family:'Almarai',sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:#f3f4f6;
}
.login-box{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
}
h2{margin-bottom:20px;text-align:center;}
input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}
button{
width:100%;
padding:12px;
background:#008080;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
button:hover{background:#006666;}
</style>
</head>

<body>

<div class="login-box">
<h2>تسجيل الدخول</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">دخول</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDIWizvGK3AxdRELeCRzk7rJ3ONzjT-0Zk",
authDomain: "mychild-9a4e9.firebaseapp.com",
databaseURL: "https://mychild-9a4e9-default-rtdb.firebaseio.com",
projectId: "mychild-9a4e9",
storageBucket: "mychild-9a4e9.firebasestorage.app",
messagingSenderId: "636633882504",
appId: "1:636633882504:android:eb352e61ce9aa7d32a643d"
};

firebase.initializeApp(firebaseConfig);

function login(){
const email=document.getElementById("email").value
const password=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,password)
.then(()=>{ window.location="index.html" })
.catch(e=>alert(e.message))
}
</script>

</body>
</html>
